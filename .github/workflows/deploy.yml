name: Full Stack CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Backend Checks
      - name: Setup Node for Backend
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci
        
      # Simulated Tests for backend
      - name: Run Backend Tests
        working-directory: ./backend
        run: echo "No tests configured but pipeline runs"

      # Frontend Checks
      - name: Setup Node for Frontend
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
          
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  deploy-platforms:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Backend Deploy
        run: |
          echo "Simulating Render trigger webhook"
          # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Trigger Netlify Frontend Deploy
        run: |
          echo "Netlify is connected automatically to main branch."
